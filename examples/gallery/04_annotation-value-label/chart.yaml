chartType: line
title: "{value} token in annotation labels (feature test)"
subtitle: Contribution to GDP growth, by category
xAxisType: numeric
data: data.csv
annotations:
  yAxis:
    - { y: -0.0738, label: "Overall ({value})", value_format: { suffix: "%", decimals: 2 } }
    - { y: 1.0, label: "Trend ({value})" }
  xAxis:
    - { x: "2022", label: "Policy change ({value})" }
  points:
    - { x: "2023", series: Services, label: "Services ({value})", value_format: { decimals: 1 } }
note: "Confirm: reference-line labels print their own values — e.g. Overall (-0.07%) — formatted per value_format; the point callout prints the snapped series value."
