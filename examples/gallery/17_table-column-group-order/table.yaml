title: "Multi-tier header ordering (feature test)"
subtitle: "Super-groups stay contiguous under column_order; column_group_order flips the super tier"
data: data.csv
stub: [{ label: country }]
header: [measure, substitution]
value: value
# Input CSV is banner-INTERLEAVED (level/delta alternate per country). The header must still
# render two super-groups each spanning colspan=2 — never interleaved colspan=1 cells.
column_group_order: [delta_vs_default, level]  # super tier: Change-vs-default before Levels
column_order: [postsub, presub]                # leaf tier: ordered WITHIN each super-group
header_labels:
  level: "Levels"
  delta_vs_default: "Change vs. default"
  presub: "Pre-substitution"
  postsub: "Post-substitution"
format:
  default: { type: percent, decimals: 1 }
source: "The Budget Lab"
notes: "Confirm: 'Change vs. default' spans first (colspan 2), then 'Levels' (colspan 2); within each, Post-substitution precedes Pre-substitution — despite the interleaved input rows."
