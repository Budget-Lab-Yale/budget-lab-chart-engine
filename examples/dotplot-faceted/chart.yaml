chartType: dotplot
title: Inequality response by labor map, across shock speeds
subtitle: Change in Gini coefficient
xAxisType: categorical
y_axis_title: Change in Gini

# Redundant color+shape encoding: both channels point at the SAME column (measure), so the
# legend collapses to one combined group of colored shapes (Pretax / Aftertax).
columns:
  x: labor
  value: value
  series: measure
  shape: measure
  facet: shock

series_order: [Aftertax, Pretax]

small_multiples:
  mode: shared
  columns: 3
  pane_order: [Slow, Moderate, Rapid]

source: Illustrative example data
data: data.csv
